# GitLab CI for the SMRFORGE marketing website (smrforge.io).
#
# Runs on every push to the canonical source (github.com/SMRFORGE/website)
# via the GitLab pull mirror, and on direct pushes to gitlab.com/smrforge/website.
# All jobs are lightweight; total wall clock is ~1-2 min on shared runners.

stages:
  - lint
  - deploy

default:
  interruptible: true

variables:
  GIT_DEPTH: "1"

# ---------------------------------------------------------------------------
# Brand-capitalization enforcement was retired from CI in May 2026. The
# brand convention (prose: SMRFORGE all caps; identifiers: SMRForge stem
# preserved) is now an authoring-time concern, not a gating concern.
# Reference: gitlab.com/smrforge/smrforge .cursor/rules/brand-capitalization.mdc
# (informational guidance, no longer CI-enforced).
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# W3C Nu HTML5 validator. Catches malformed HTML, duplicate IDs, missing
# required attributes, etc. Uses the html5validator Python wrapper, which
# bundles the official W3C JAR.
# ---------------------------------------------------------------------------
html-validate:
  stage: lint
  image: python:3.11-slim
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends default-jre-headless > /dev/null
    - pip install --no-cache-dir html5validator
  script:
    - html5validator --root . --match "*.html"

# ---------------------------------------------------------------------------
# Link checker. External links can flake (rate limits, transient DNS), so
# this job is allow_failure - it surfaces broken links without blocking
# merges. Tighten by removing allow_failure once external flake rate is
# acceptable.
# ---------------------------------------------------------------------------
link-check:
  stage: lint
  image: lycheeverse/lychee:latest
  allow_failure: true
  script:
    - |
      lychee \
        --no-progress \
        --max-concurrency 4 \
        --exclude-mail \
        --exclude-loopback \
        --exclude-private \
        --base . \
        index.html

# ---------------------------------------------------------------------------
# Sitemap and robots.txt sanity checks.
# ---------------------------------------------------------------------------
sitemap-check:
  stage: lint
  image: alpine:3.19
  before_script:
    - apk add --no-cache libxml2-utils
  script:
    - |
      set -e
      xmllint --noout sitemap.xml
      echo "OK - sitemap.xml is well-formed XML"
      test -s robots.txt
      echo "OK - robots.txt is non-empty"
      grep -q "^Sitemap:" robots.txt
      echo "OK - robots.txt declares the Sitemap"
