# GitLab CI for the SMRFORGE marketing website (smrforge.io).
#
# Runs on every push to the canonical source (github.com/SMRFORGE/website)
# via the GitLab pull mirror, and on direct pushes to gitlab.com/smrforge/website.
# All jobs are lightweight; total wall clock is ~1-2 min on shared runners.

stages:
  - lint
  - deploy

default:
  interruptible: true

variables:
  GIT_DEPTH: "1"

# ---------------------------------------------------------------------------
# Brand-capitalization enforcement was retired from CI in May 2026. The
# brand convention (prose: SMRFORGE all caps; identifiers: SMRForge stem
# preserved) is now an authoring-time concern, not a gating concern.
# Reference: gitlab.com/smrforge/smrforge .cursor/rules/brand-capitalization.mdc
# (informational guidance, no longer CI-enforced).
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# W3C Nu HTML5 validator. Catches malformed HTML, duplicate IDs, missing
# required attributes, etc. Uses the html5validator Python wrapper, which
# bundles the official W3C JAR.
# ---------------------------------------------------------------------------
html-validate:
  stage: lint
  image: python:3.11-slim
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends default-jre-headless > /dev/null
    - pip install --no-cache-dir html5validator
  script:
    - html5validator --root . --match "*.html"

# ---------------------------------------------------------------------------
# Link checker. External links can flake (rate limits, transient DNS), so
# this job is allow_failure - it surfaces broken links without blocking
# merges. Tighten by removing allow_failure once external flake rate is
# acceptable.
#
# We run a PINNED lychee binary inside Alpine rather than the
# `lycheeverse/lychee` image directly: recent lychee images are shell-less,
# so GitLab CI's `script:` block cannot start (it needs /bin/sh). Alpine
# gives us a shell + musl; we drop in the pinned musl binary. Bump
# LYCHEE_VERSION deliberately instead of tracking a floating `:latest`.
# (The old `--base .` flag was removed upstream; the site uses relative and
# absolute links only, so no base is needed.)
# ---------------------------------------------------------------------------
link-check:
  stage: lint
  image: alpine:3.19
  allow_failure: true
  variables:
    LYCHEE_VERSION: "0.24.2"
  before_script:
    - apk add --no-cache curl ca-certificates tar
    - mkdir -p /tmp/lychee
    - curl -sSfL "https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-musl.tar.gz" -o /tmp/lychee.tar.gz
    - tar -xzf /tmp/lychee.tar.gz -C /tmp/lychee
    # The archive layout varies by release (binary at root or under a subdir),
    # so locate the binary rather than assume its path.
    - install -m 0755 "$(find /tmp/lychee -type f -name lychee | head -1)" /usr/local/bin/lychee
    - lychee --version
  script:
    # mailto: links are excluded by default in current lychee.
    # Excludes:
    #  - LinkedIn/X reject bot traffic (999/403) — perpetual flake, not real.
    #  - gitlab.com/smrforge/* and readthedocs are private/unpublished during
    #    the private beta, so an anonymous checker gets 403/404. REMOVE these
    #    two excludes once the repo and docs are public.
    - |
      lychee \
        --no-progress \
        --max-concurrency 4 \
        --exclude 'linkedin\.com' \
        --exclude '//x\.com/' \
        --exclude 'gitlab\.com/smrforge' \
        --exclude 'smrforge\.readthedocs\.io' \
        index.html

# ---------------------------------------------------------------------------
# Sitemap and robots.txt sanity checks.
# ---------------------------------------------------------------------------
sitemap-check:
  stage: lint
  image: alpine:3.19
  before_script:
    - apk add --no-cache libxml2-utils
  script:
    - |
      set -e
      xmllint --noout sitemap.xml
      echo "OK - sitemap.xml is well-formed XML"
      test -s robots.txt
      echo "OK - robots.txt is non-empty"
      grep -q "^Sitemap:" robots.txt
      echo "OK - robots.txt declares the Sitemap"
